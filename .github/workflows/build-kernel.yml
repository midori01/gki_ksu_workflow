name: Module - Build Kernel Image

on:
  workflow_call:
    inputs:
      kernel_version:
        required: true
        type: string
      variant:
        required: true
        type: string
      use_droidspaces:
        required: true
        type: boolean
      use_rekernel:
        required: false
        type: boolean
        default: true
      unicode_bypass_fix:
        required: false
        type: boolean
        default: false
      use_susfs:
        required: true
        type: boolean
      midorisu_ko_branch:
        required: false
        type: string
        default: 'KOWX712/KernelSU:master'
      midorisu_nx_branch:
        required: false
        type: string
        default: 'KernelSU-Next/KernelSU-Next:dev'
      midorisu_og_branch:
        required: false
        type: string
        default: 'tiann/KernelSU:main'
      midorisu_re_branch:
        required: false
        type: string
        default: 'ReSukiSU/ReSukiSU:main'
      midorisu_xx_branch:
        required: false
        type: string
        default: 'backslashxx/KernelSU:master'
      hook_mode:
        required: false
        type: string
      ksu_debug:
        required: false
        type: boolean
        default: false
      source_mirror:
        required: true
        type: string
      use_ccache:
        required: false
        type: boolean
        default: true
      susfs_commit:
        required: false
        type: string
        default: ''
      build_ebpf:
        required: true
        type: boolean
      kernel_localversion:
        required: true
        type: string
      build_epoch:
        required: true
        type: string
      build_timestamp:
        required: true
        type: string
      build_user:
        required: true
        type: string
      build_host:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    env:
      DS_SUFFIX: ${{ inputs.use_droidspaces && '-DS' || '' }}
      SUSFS_SUFFIX: ${{ inputs.use_susfs && '-SUSFS' || '' }}
      CCACHE_DIR: ${{ github.workspace }}/.ccache-${{ inputs.variant }}${{ inputs.use_susfs && '-susfs' || '' }}${{ inputs.use_droidspaces && '-ds' || '' }}
      CCACHE_COMPILERCHECK: content
      CCACHE_SLOPPINESS: file_macro,time_macros,include_file_mtime,include_file_ctime

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1

      - name: Load Config
        id: cfg
        run: |
          config=$(jq -c '.["'${{ inputs.kernel_version }}'"]' .github/config/kernel_versions.json)
          echo "android_version=$(echo "$config" | jq -r '.android_version')" >> $GITHUB_OUTPUT
          sub_level=$(echo "$config" | jq -r '.default_sub_level')
          echo "sub_level=$sub_level" >> $GITHUB_OUTPUT
          revision=$(echo "$config" | jq -c '.revisions["'$sub_level'"]')
          echo "asb_date=$(echo "$revision" | jq -r '.asb_date')" >> $GITHUB_OUTPUT
          r_version=$(echo "$revision" | jq -r '.default_r')
          echo "r_version=$r_version" >> $GITHUB_OUTPUT
          echo "r_suffix=$([ "$r_version" != "none" ] && echo "_$r_version" || echo '')" >> $GITHUB_OUTPUT
          echo "clang_version=$(echo "$config" | jq -r '.default_clang')" >> $GITHUB_OUTPUT
          rust=$(echo "$config" | jq -r '.rust')
          echo "rust_enabled=$rust" >> $GITHUB_OUTPUT
          [ "$rust" = "true" ] && echo "rust_version=$(echo "$config" | jq -r '.default_rust')" >> $GITHUB_OUTPUT
          echo "mirror_tag=$(echo "$config" | jq -r '.mirror_tag')" >> $GITHUB_OUTPUT
          echo "anykernel_branch=$(echo "$config" | jq -r '.anykernel_branch')" >> $GITHUB_OUTPUT
          echo "kmi_version=$(echo "$config" | jq -r '.android_version')-${{ inputs.kernel_version }}" >> $GITHUB_OUTPUT

      - name: Free Disk Space & Install Dependencies
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL 2>/dev/null || true &
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            binutils python-is-python3 libssl-dev libelf-dev libdw-dev bison flex bc aria2 ccache &

      - name: Restore Ccache
        if: inputs.use_ccache
        id: cache-restore
        uses: ./.github/actions/restore-cache-retry
        with:
          path: .ccache-${{ inputs.variant }}${{ inputs.use_susfs && '-susfs' || '' }}${{ inputs.use_droidspaces && '-ds' || '' }}
          key: gki-${{ inputs.kernel_version }}-${{ steps.cfg.outputs.clang_version }}-${{ steps.cfg.outputs.asb_date }}${{ steps.cfg.outputs.r_suffix }}-${{ inputs.variant }}${{ inputs.use_susfs && '-susfs' || '' }}${{ inputs.use_droidspaces && '-ds' || '' }}-${{ github.run_id }}
          restore-keys: gki-${{ inputs.kernel_version }}-${{ steps.cfg.outputs.clang_version }}-${{ steps.cfg.outputs.asb_date }}${{ steps.cfg.outputs.r_suffix }}-${{ inputs.variant }}${{ inputs.use_susfs && '-susfs' || '' }}${{ inputs.use_droidspaces && '-ds' || '' }}-

      - name: Setup Ccache Wrappers
        if: inputs.use_ccache
        run: |
          for i in $(seq 1 60); do which ccache >/dev/null 2>&1 && break; sleep 1; done
          which ccache || { echo "ccache not found after waiting"; exit 1; }
          CCACHE_PATH="${{ github.workspace }}/.ccache-bin"
          mkdir -p "$CCACHE_PATH" && rm -f "$CCACHE_PATH"/*
          for prog in clang clang++ ld.lld llvm-ar llvm-nm llvm-objcopy llvm-objdump llvm-size llvm-readelf llvm-strip; do
            ln -sf "$(which ccache)" "$CCACHE_PATH/$prog"
          done
          echo "$CCACHE_PATH" >> $GITHUB_PATH
          ccache -M 10G \
            -o hash_dir=false \
            -o compiler_check=content \
            -o "sloppiness=file_macro,time_macros,include_file_mtime,include_file_ctime,pch_defines,modules" \
            -o depend_mode=true \
            -o run_second_cpp=true \
            -o compression=true \
            -o compression_level=1 \
            -o keep_comments_cpp=true \
            -o "cache_dir=${{ env.CCACHE_DIR }}" \
            -o "base_dir=${{ github.workspace }}" \
            -o file_clone=false \
            -o hard_link=false \
            -z

      - name: Download Toolchains & Kernel Source
        run: |
          mkdir -p kernel_workspace && cd kernel_workspace
          MIDORI_MIRROR="https://github.com/${{ github.repository }}/releases/download/${{ steps.cfg.outputs.mirror_tag }}"
          CLANG_TAR="clang-${{ steps.cfg.outputs.clang_version }}.tar.gz"
          KERNEL_TAR="${{ steps.cfg.outputs.android_version }}-${{ inputs.kernel_version }}-${{ steps.cfg.outputs.asb_date }}${{ steps.cfg.outputs.r_suffix }}.tar.gz"
          if [ "${{ inputs.source_mirror }}" = "google" ]; then
            GOOGLE_REF=$([ "${{ steps.cfg.outputs.r_version }}" = "none" ] && echo "heads" || echo "tags")
            KERNEL_BASE_URL="https://android.googlesource.com/kernel/common/+archive/refs/$GOOGLE_REF"
          else
            KERNEL_BASE_URL="$MIDORI_MIRROR"
          fi
          retry() { for i in $(seq 1 30); do "$@" && return 0; echo "Retry $i/30..."; sleep 30; done; return 1; }
          retry aria2c -s16 -x16 -k1M "$MIDORI_MIRROR/$CLANG_TAR" -o clang.tar.gz &
          retry aria2c -s16 -x16 -k1M "$MIDORI_MIRROR/build-tools.tar.gz" -o build-tools.tar.gz &
          [ "${{ steps.cfg.outputs.rust_enabled }}" = "true" ] && {
            retry aria2c -s16 -x16 -k1M "$MIDORI_MIRROR/clang-tools.tar.gz" -o clang-tools.tar.gz &
            retry aria2c -s16 -x16 -k1M "$MIDORI_MIRROR/rust-${{ steps.cfg.outputs.rust_version }}.tar.gz" -o rust.tar.gz &
          }
          retry aria2c -s16 -x16 -k1M "$KERNEL_BASE_URL/$KERNEL_TAR" -o common.tar.gz &
          wait
          for f in *.tar.gz; do mkdir -p "${f%%.*}" && tar -xzf "$f" -C "${f%%.*}" & done
          wait
          rm -f *.tar.gz
          sed -i 's/ -dirty//g' common/scripts/setlocalversion
          sed -i '/^#ifdef USE_PKCS11_ENGINE$/,/^#endif$/c\static const char *key_pass;' common/certs/extract-cert.c
          [ "${{ inputs.kernel_version }}" != "6.12" ] && rm -f common/android/abi_gki_protected_exports_* || true

      - name: Setup KernelSU
        working-directory: kernel_workspace/common
        run: |
          echo "[+] Fetching commit count from MidoriSU..."
          COMMIT_COUNT=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/midori01/KernelSU/commits?per_page=1" \
            -I 2>&1 | grep "link:" | grep -oP '&page=\K\d+(?=>; rel="last")')
          COMMIT_COUNT=${COMMIT_COUNT:-0}
          KSU_VERSION=$((30999 + COMMIT_COUNT))
          echo "[+] KSU_VERSION=$KSU_VERSION"
          mkdir -p commit_info
          echo "$KSU_VERSION" > commit_info/driver_version
          export KSU_VERSION
          case "${{ inputs.variant }}" in
            MidoriSU-KO)
              IFS=':' read -r REPO BRANCH <<< "${{ inputs.midorisu_ko_branch }}"
              git clone --branch="${BRANCH}" "https://github.com/${REPO}.git" KernelSU
              patch -p1 -d KernelSU --forward < "${{ github.workspace }}/.github/patches/24_extra_features_for_ksu.patch" || true
              ;;
            MidoriSU-NX)
              IFS=':' read -r REPO BRANCH <<< "${{ inputs.midorisu_nx_branch }}"
              git clone --branch="${BRANCH}" "https://github.com/${REPO}.git" KernelSU
              patch -p1 -d KernelSU --forward < "${{ github.workspace }}/.github/patches/22_extra_features_for_ksu.patch" || true
              ;;
            MidoriSU-OG)
              IFS=':' read -r REPO BRANCH <<< "${{ inputs.midorisu_og_branch }}"
              git clone --branch="${BRANCH}" "https://github.com/${REPO}.git" KernelSU
              patch -p1 -d KernelSU --forward < "${{ github.workspace }}/.github/patches/20_extra_features_for_ksu.patch" || true
              ;;
            MidoriSU-RE)
              IFS=':' read -r REPO BRANCH <<< "${{ inputs.midorisu_re_branch }}"
              git clone --branch="${BRANCH}" "https://github.com/${REPO}.git" KernelSU
              patch -p1 -d KernelSU --forward < "${{ github.workspace }}/.github/patches/23_extra_features_for_ksu.patch" || true
              ;;
            MidoriSU-XX)
              IFS=':' read -r REPO BRANCH <<< "${{ inputs.midorisu_xx_branch }}"
              git clone --branch="${BRANCH}" "https://github.com/${REPO}.git" KernelSU
              patch -p1 -d KernelSU --forward < "${{ github.workspace }}/.github/patches/21_extra_features_for_ksu.patch" || true
              ;;
          esac
          bash "${{ github.workspace }}/.github/scripts/setup_ksu.sh"
          ln -sf ../KernelSU/kernel drivers/kernelsu
          grep -q "kernelsu" drivers/Makefile || echo 'obj-$(CONFIG_KSU) += kernelsu/' >> drivers/Makefile
          grep -q "drivers/kernelsu/Kconfig" drivers/Kconfig || sed -i '/endmenu/i source "drivers/kernelsu/Kconfig"' drivers/Kconfig

      - name: Setup SUSFS
        if: inputs.use_susfs
        working-directory: kernel_workspace/common
        run: |
          SUSFS_DIR="${{ github.workspace }}/susfs4ksu"
          git clone https://gitlab.com/simonpunk/susfs4ksu "$SUSFS_DIR"
          if [ -n "${{ inputs.susfs_commit }}" ]; then
            git -C "$SUSFS_DIR" checkout "${{ inputs.susfs_commit }}"
          else
            git -C "$SUSFS_DIR" checkout "gki-${{ steps.cfg.outputs.kmi_version }}"
          fi
          cp "$SUSFS_DIR"/kernel_patches/fs/* fs/
          cp "$SUSFS_DIR"/kernel_patches/include/linux/* include/linux/
          case "${{ inputs.variant }}" in
            MidoriSU-KO)
              patch -p1 < "${{ github.workspace }}/.github/patches/${{ steps.cfg.outputs.kmi_version }}/50_add_susfs_in_gki-${{ steps.cfg.outputs.kmi_version }}.patch"
              patch -p1 -d KernelSU < "${{ github.workspace }}/.github/patches/10_enable_susfs_for_ksu.patch"
              ;;
            MidoriSU-NX)
              patch -p1 < "${{ github.workspace }}/.github/patches/${{ steps.cfg.outputs.kmi_version }}/50_add_susfs_in_gki-${{ steps.cfg.outputs.kmi_version }}.patch"
              patch -p1 -d KernelSU < "${{ github.workspace }}/.github/patches/12_enable_susfs_for_ksu.patch"
              ;;
            MidoriSU-OG)
              patch -p1 < "${{ github.workspace }}/.github/patches/${{ steps.cfg.outputs.kmi_version }}/50_add_susfs_in_gki-${{ steps.cfg.outputs.kmi_version }}.patch"
              patch -p1 -d KernelSU < "$SUSFS_DIR/kernel_patches/KernelSU/10_enable_susfs_for_ksu.patch"
              patch -p1 -d KernelSU < "${{ github.workspace }}/.github/patches/30_ksu_toolkit_for_ksu.patch"
              ;;
            MidoriSU-RE)
              patch -p1 < "${{ github.workspace }}/.github/patches/${{ steps.cfg.outputs.kmi_version }}/50_add_susfs_in_gki-${{ steps.cfg.outputs.kmi_version }}.patch"
              ;;
            MidoriSU-XX)
              patch -p1 < "${{ github.workspace }}/.github/patches/${{ steps.cfg.outputs.kmi_version }}/51_deinlined_susfs_hooks_gki-${{ steps.cfg.outputs.kmi_version }}.patch"
              patch -p1 -d KernelSU < "${{ github.workspace }}/.github/patches/11_enable_susfs_for_ksu.patch"
              ;;
          esac

      - name: Setup Manual Hooks
        if: >-
          (inputs.variant == 'MidoriSU-XX' && inputs.hook_mode != 'hookless') ||
          (inputs.variant == 'MidoriSU-RE' && inputs.hook_mode == 'manual' && inputs.use_susfs != true)
        working-directory: kernel_workspace/common
        run: |
          case "${{ inputs.variant }}" in
            MidoriSU-XX)
              patch -p1 < "${{ github.workspace }}/.github/patches/${{ steps.cfg.outputs.kmi_version }}/scope-min-manual-hooks-v2.2.patch"
              ;;
            MidoriSU-RE)
              patch -p1 < "${{ github.workspace }}/.github/patches/${{ steps.cfg.outputs.kmi_version }}/resukisu-manual-hooks.patch"
              ;;
          esac

      - name: Setup Droidspaces
        if: inputs.use_droidspaces
        working-directory: kernel_workspace/common
        run: |
          patch -p1 < "${{ github.workspace }}/.github/patches/${{ steps.cfg.outputs.kmi_version }}/fix_sysvipc_kabi.patch"
          patch -p1 < "${{ github.workspace }}/.github/patches/${{ steps.cfg.outputs.kmi_version }}/ntsync_base_compat.patch"

      - name: Setup ReKernel
        if: inputs.use_rekernel
        working-directory: kernel_workspace/common
        run: |
          REKERNEL_DIR="${{ github.workspace }}/Re-Kernel"
          git clone --depth=1 https://github.com/Sakion-Team/Re-Kernel.git "$REKERNEL_DIR"
          cp -r "$REKERNEL_DIR"/LKM-Source drivers/rekernel
          sed -i 's/depends on MODULES/depends on KSU/' drivers/rekernel/Kconfig
          sed -i 's/obj-m := rekernel.o/obj-$(CONFIG_REKERNEL) += rekernel.o/' drivers/rekernel/Makefile
          grep -q "rekernel" drivers/Makefile || echo 'obj-$(CONFIG_REKERNEL) += rekernel/' >> drivers/Makefile
          grep -q "drivers/rekernel/Kconfig" drivers/Kconfig || sed -i '/endmenu/i source "drivers/rekernel/Kconfig"' drivers/Kconfig

      - name: Apply Unicode Bypass Fix
        if: inputs.unicode_bypass_fix
        working-directory: kernel_workspace/common
        run: |
          patch -p1 < "${{ github.workspace }}/.github/patches/unicode_bypass_fix_6.1+.patch"

      - name: Inject Kernel Configs
        uses: ./.github/actions/kernel-config
        with:
          defconfig_path: "kernel_workspace/common/arch/arm64/configs/gki_defconfig"
          build_config_path: "kernel_workspace/common/build.config.gki"
          variant: ${{ inputs.variant }}
          enable_susfs: ${{ inputs.use_susfs }}
          localversion: ${{ inputs.kernel_localversion }}
          use_droidspaces: ${{ inputs.use_droidspaces }}
          use_rekernel: ${{ inputs.use_rekernel }}
          hook_mode: ${{ inputs.hook_mode }}
          ksu_debug: ${{ inputs.ksu_debug }}

      - name: Save Commit Info
        working-directory: kernel_workspace/common
        run: |
          COMMIT_DIR="$(pwd)/commit_info"
          mkdir -p "$COMMIT_DIR"
          cd KernelSU
          save_ksu_commit() {
            git rev-parse HEAD > "$COMMIT_DIR/${1}_ksu_commit"
            git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M %z' HEAD > "$COMMIT_DIR/${1}_ksu_date"
          }
          save_susfs_commit() {
            if [ "${{ inputs.use_susfs }}" = "true" ] && [ -d "${{ github.workspace }}/susfs4ksu" ]; then
              pushd "${{ github.workspace }}/susfs4ksu" > /dev/null
              git rev-parse HEAD > "$COMMIT_DIR/susfs_commit"
              git log -1 --format=%cd --date=format:'%Y-%m-%d %H:%M %z' HEAD > "$COMMIT_DIR/susfs_date"
              popd > /dev/null
            fi
          }
          case "${{ inputs.variant }}" in
            MidoriSU-KO)
              save_ksu_commit midorisu_ko
              echo "${{ inputs.midorisu_ko_branch }}" | cut -d: -f1 | cut -d/ -f1 > "$COMMIT_DIR/midorisu_ko_ksu_author"
              echo "${{ inputs.midorisu_ko_branch }}" | cut -d: -f1 > "$COMMIT_DIR/midorisu_ko_ksu_repo"
              save_susfs_commit
              ;;
            MidoriSU-NX)
              save_ksu_commit midorisu_nx
              echo "${{ inputs.midorisu_nx_branch }}" | cut -d: -f1 | cut -d/ -f1 > "$COMMIT_DIR/midorisu_nx_ksu_author"
              echo "${{ inputs.midorisu_nx_branch }}" | cut -d: -f1 > "$COMMIT_DIR/midorisu_nx_ksu_repo"
              save_susfs_commit
              ;;
            MidoriSU-OG)
              save_ksu_commit midorisu_og
              echo "${{ inputs.midorisu_og_branch }}" | cut -d: -f1 | cut -d/ -f1 > "$COMMIT_DIR/midorisu_og_ksu_author"
              echo "${{ inputs.midorisu_og_branch }}" | cut -d: -f1 > "$COMMIT_DIR/midorisu_og_ksu_repo"
              save_susfs_commit
              ;;
            MidoriSU-RE)
              save_ksu_commit midorisu_re
              echo "${{ inputs.midorisu_re_branch }}" | cut -d: -f1 | cut -d/ -f1 > "$COMMIT_DIR/midorisu_re_ksu_author"
              echo "${{ inputs.midorisu_re_branch }}" | cut -d: -f1 > "$COMMIT_DIR/midorisu_re_ksu_repo"
              save_susfs_commit
              ;;
            MidoriSU-XX)
              save_ksu_commit midorisu_xx
              echo "${{ inputs.midorisu_xx_branch }}" | cut -d: -f1 | cut -d/ -f1 > "$COMMIT_DIR/midorisu_xx_ksu_author"
              echo "${{ inputs.midorisu_xx_branch }}" | cut -d: -f1 > "$COMMIT_DIR/midorisu_xx_ksu_repo"
              save_susfs_commit
              ;;
          esac

      - name: Upload Commit Info
        uses: actions/upload-artifact@v7
        with:
          name: commit-info-${{ inputs.kernel_version }}-${{ inputs.variant }}${{ env.SUSFS_SUFFIX }}${{ env.DS_SUFFIX }}
          path: kernel_workspace/common/commit_info/
          retention-days: 1

      - name: Compile Kernel
        working-directory: kernel_workspace/common
        run: |
          WORK_DIR="${{ github.workspace }}/kernel_workspace"
          export PATH="${WORK_DIR}/clang/bin:${WORK_DIR}/build-tools/bin:${WORK_DIR}/clang-tools/bin:${WORK_DIR}/rust/bin:${PATH}"
          export LIBCLANG_PATH="${WORK_DIR}/clang/lib"
          if [ -d "${{ github.workspace }}/.ccache-bin" ]; then
            export PATH="${{ github.workspace }}/.ccache-bin:${PATH}"
          fi
          ROOT_REAL_PATH=$(dirname "$(readlink -f "$PWD")")
          export KBUILD_GENDWARFKSYMS_STABLE=1
          export KCFLAGS="-fdebug-prefix-map=$ROOT_REAL_PATH=. -fmacro-prefix-map=$ROOT_REAL_PATH=. -ffile-prefix-map=$ROOT_REAL_PATH=. -no-canonical-prefixes -pipe -fno-stack-protector -D__ANDROID_COMMON_KERNEL__"
          export SOURCE_DATE_EPOCH="${{ inputs.build_epoch }}"
          export KBUILD_BUILD_TIMESTAMP="${{ inputs.build_timestamp }}"
          export KBUILD_BUILD_HOST="${{ inputs.build_host }}"
          export KBUILD_BUILD_USER="${{ inputs.build_user }}"
          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig
          make -j$(nproc) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image
          [ "${{ inputs.use_ccache }}" = "true" ] && ccache -s || true

      - name: Export vmlinux for eBPF
        if: inputs.build_ebpf
        working-directory: kernel_workspace/common/out
        run: |
          [ -f "vmlinux" ] && zstd -T0 -10 vmlinux -o vmlinux.zst

      - name: Upload vmlinux Artifact
        if: inputs.build_ebpf
        uses: actions/upload-artifact@v7
        with:
          name: vmlinux-${{ inputs.kernel_version }}-${{ inputs.variant }}${{ env.SUSFS_SUFFIX }}${{ env.DS_SUFFIX }}
          path: kernel_workspace/common/out/vmlinux.zst
          retention-days: 1

      - name: Package Kernel
        working-directory: kernel_workspace
        run: |
          IMAGE="common/out/arch/arm64/boot/Image"
          [ -f "$IMAGE" ] || { echo "Binary Missing!"; exit 1; }
          ZIP_NAME="${{ inputs.variant }}_Kernel-${{ inputs.kernel_version }}.${{ steps.cfg.outputs.sub_level }}${{ steps.cfg.outputs.r_suffix }}${{ env.SUSFS_SUFFIX }}${{ env.DS_SUFFIX }}.zip"
          git clone --depth=1 https://github.com/midori01/AnyKernel3 -b ${{ steps.cfg.outputs.anykernel_branch }} anykernel
          cp "$IMAGE" anykernel/
          cd anykernel && rm -rf .git && zip -r9 "../$ZIP_NAME" *
          echo "ZIP_NAME=$ZIP_NAME" >> $GITHUB_ENV

      - name: Save Ccache
        if: inputs.use_ccache
        uses: actions/cache/save@v6
        with:
          path: .ccache-${{ inputs.variant }}${{ inputs.use_susfs && '-susfs' || '' }}${{ inputs.use_droidspaces && '-ds' || '' }}
          key: gki-${{ inputs.kernel_version }}-${{ steps.cfg.outputs.clang_version }}-${{ steps.cfg.outputs.asb_date }}${{ steps.cfg.outputs.r_suffix }}-${{ inputs.variant }}${{ inputs.use_susfs && '-susfs' || '' }}${{ inputs.use_droidspaces && '-ds' || '' }}-${{ github.run_id }}

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v7
        with:
          name: Kernel-${{ inputs.kernel_version }}-${{ inputs.variant }}${{ env.SUSFS_SUFFIX }}${{ env.DS_SUFFIX }}${{ steps.cfg.outputs.r_suffix }}
          path: kernel_workspace/${{ env.ZIP_NAME }}
