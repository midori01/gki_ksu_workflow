name: Build and Release
run-name: ${{ format('{0}{1}', inputs.kernel_version == 'all' && inputs.ksu_variant == 'all' && 'All Kernels - All Variants' || inputs.kernel_version == 'all' && format('All Kernels - {0}', inputs.ksu_variant) || inputs.ksu_variant == 'all' && format('Kernel {0} - All Variants', inputs.kernel_version) || format('Kernel {0} - {1}', inputs.kernel_version, inputs.ksu_variant), inputs.ksu_debug && ' [DEBUG]' || '') }}

on:
  workflow_dispatch:
    inputs:
      source_mirror:
        description: 'Kernel Source'
        required: true
        default: 'midori'
        type: choice
        options:
          - midori
          - google
      kernel_version:
        description: 'Kernel Version'
        required: true
        default: 'all'
        type: choice
        options:
          - 'all'
          - '6.1'
          - '6.6'
          - '6.12'
      ksu_variant:
        description: 'KernelSU Variant'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - MidoriSU-KO
          - MidoriSU-NX
          - MidoriSU-OG
          - MidoriSU-RE
          - MidoriSU-XX
      midorisu_ko_branch:
        description: 'MidoriSU-KO Source'
        required: true
        default: 'KOWX712/KernelSU:master'
        type: choice
        options:
          - 'KOWX712/KernelSU:master'
          - 'midori01/KernelSU:kow'
      midorisu_nx_branch:
        description: 'MidoriSU-NX Source'
        required: true
        default: 'KernelSU-Next/KernelSU-Next:dev'
        type: choice
        options:
          - 'KernelSU-Next/KernelSU-Next:dev'
          - 'midori01/KernelSU:next'
      midorisu_og_branch:
        description: 'MidoriSU-OG Source'
        required: true
        default: 'tiann/KernelSU:main'
        type: choice
        options:
          - 'tiann/KernelSU:main'
          - 'midori01/KernelSU:tiann'
      midorisu_re_branch:
        description: 'MidoriSU-RE Source'
        required: true
        default: 'ReSukiSU/ReSukiSU:main'
        type: choice
        options:
          - 'ReSukiSU/ReSukiSU:main'
          - 'midori01/ReSukiSU:main'
      midorisu_xx_branch:
        description: 'MidoriSU-XX Source'
        required: true
        default: 'backslashxx/KernelSU:master'
        type: choice
        options:
          - 'backslashxx/KernelSU:master'
          - 'backslashxx/KernelSU:staging'
          - 'midori01/KernelSU:xx'
      hook_mode:
        description: "Hook Mode"
        required: true
        default: 'manual (XX & RE)'
        type: choice
        options:
          - 'manual (XX & RE)'
          - 'hookless (XX 6.12 only)'
          - 'tracepoint (RE only)'
      ksu_debug:
        description: 'KernelSU Debug'
        required: true
        default: false
        type: boolean
      use_ccache:
        description: 'Ccache Speedup'
        required: true
        default: true
        type: boolean
      use_droidspaces:
        description: 'Droidspaces & NTSync'
        required: true
        default: true
        type: boolean
      use_rekernel:
        description: 'Re:Kernel'
        required: true
        default: true
        type: boolean
      unicode_bypass_fix:
        description: 'Unicode Bypass Fix'
        required: true
        default: true
        type: boolean
      build_scene_hider:
        description: 'eBPF Scene Hider'
        required: true
        default: true
        type: boolean
      enable_susfs:
        description: 'SUSFS'
        required: true
        default: true
        type: boolean
      susfs_commit:
        description: 'SUSFS Commit Hash (Leave blank for latest)'
        required: false
        default: ''
        type: string
      kernel_localversion:
        description: 'Spoof Kernel Name (Leave blank for auto)'
        required: false
        default: ''
        type: string
      build_timestamp:
        description: 'Spoof Build Time (Leave blank for now)'
        required: false
        default: ''
        type: string
      build_user:
        description: 'Spoof Build User'
        required: true
        default: 'midori'
        type: string
      build_host:
        description: 'Spoof Build Host'
        required: true
        default: 'build-host'
        type: string
      release_type:
        description: 'Release Type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - pre-release
          - no-release
      cleanup_tags:
        description: "Cleanup Old Releases"
        type: boolean
        required: true
        default: true

permissions:
  contents: write
  packages: write

jobs:
  fetch:
    uses: ./.github/workflows/update.yml

  setup:
    needs: fetch
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.config.outputs.release_tag }}
      build_matrix: ${{ steps.config.outputs.build_matrix }}
      metadata: ${{ steps.config.outputs.metadata }}
      kernel_versions: ${{ steps.config.outputs.kernel_versions }}
      hook_mode_val: ${{ steps.config.outputs.hook_mode_val }}
      kernel_localversion: ${{ steps.config.outputs.kernel_localversion }}
      build_timestamp: ${{ steps.config.outputs.build_timestamp }}
      build_epoch: ${{ steps.config.outputs.build_epoch }}
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v7

      - id: config
        name: Prepare build matrix and metadata
        run: |
          echo "release_tag=$(TZ='Asia/Tokyo' date +'%Y%m%d-%H%M')" >> $GITHUB_OUTPUT
          config_file=".github/config/kernel_versions.json"

          if [ "${{ inputs.kernel_version }}" = "all" ]; then
            kvs='["6.1","6.6","6.12"]'
          else
            kvs='["${{ inputs.kernel_version }}"]'
          fi
          echo "kernel_versions=$kvs" >> $GITHUB_OUTPUT

          SUFFIX="-midori"
          [ "${{ inputs.enable_susfs }}" = "true" ] && SUFFIX="${SUFFIX}-susfs"
          [ "${{ inputs.use_droidspaces }}" = "true" ] && SUFFIX="${SUFFIX}-droidspaces"
          echo "kernel_localversion=${{ inputs.kernel_localversion || 'SUFFIX_PLACEHOLDER' }}" | sed "s/SUFFIX_PLACEHOLDER/$SUFFIX/" >> $GITHUB_OUTPUT

          if [ -z "${{ inputs.build_timestamp }}" ] || [ "${{ inputs.build_timestamp }}" = "''" ]; then
            build_ts="$(TZ='UTC' date +'%a %b %d %H:%M:%S UTC %Y')"
            build_ep="$(date +%s)"
          else
            build_ts="${{ inputs.build_timestamp }}"
            build_ep="$(date -d "$build_ts" +%s 2>/dev/null)"
            if [ -z "$build_ep" ]; then
              build_ts="$(TZ='UTC' date +'%a %b %d %H:%M:%S UTC %Y')"
              build_ep="$(date +%s)"
            fi
          fi
          echo "build_timestamp=$build_ts" >> $GITHUB_OUTPUT
          echo "build_epoch=$build_ep" >> $GITHUB_OUTPUT

          rm -f /tmp/metadata.json
          echo "$kvs" | jq -r '.[]' > /tmp/kvs.txt

          matrix='{"include":[]}'
          variant="${{ inputs.ksu_variant }}"
          while read kv; do
            config=$(jq -c '.["'$kv'"]' "$config_file")
            android_version=$(echo "$config" | jq -r '.android_version')
            sub_level=$(echo "$config" | jq -r '.default_sub_level')
            revision=$(echo "$config" | jq -c '.revisions["'$sub_level'"]')
            asb_date=$(echo "$revision" | jq -r '.asb_date')
            r_version=$(echo "$revision" | jq -r '.default_r')
            r_suffix=$([ "$r_version" != "none" ] && echo "_$r_version" || echo '')
            clang_version=$(echo "$config" | jq -r '.default_clang')
            rust=$(echo "$config" | jq -r '.rust')
            [ "$rust" = "true" ] && rust_version=$(echo "$config" | jq -r '.default_rust') || rust_version=""
            mirror_tag=$(echo "$config" | jq -r '.mirror_tag')
            anykernel_branch=$(echo "$config" | jq -r '.anykernel_branch')
            google_ref=$([ "$r_version" = "none" ] && echo "heads" || echo "tags")
            if [ "${{ inputs.source_mirror }}" = "google" ]; then
              source_url="https://android.googlesource.com/kernel/common/+archive/refs/$google_ref"
              mirror_name="Google"
            else
              source_url="https://github.com/${{ github.repository }}/releases/download/$mirror_tag"
              mirror_name="GitHub"
            fi

            jq -n \
              --arg kv "$kv" \
              --arg android_version "$android_version" \
              --arg sub_level "$sub_level" \
              --arg asb_date "$asb_date" \
              --arg r_version "$r_version" \
              --arg r_suffix "$r_suffix" \
              --arg clang_version "$clang_version" \
              --arg rust_version "$rust_version" \
              --arg source_url "$source_url" \
              --arg mirror_name "$mirror_name" \
              --arg anykernel_branch "$anykernel_branch" \
              '{kernel_version:$kv,android_version:$android_version,sub_level:$sub_level,asb_date:$asb_date,r_version:$r_version,r_suffix:$r_suffix,clang_version:$clang_version,rust_version:$rust_version,source_base_url:$source_url,mirror_name:$mirror_name,anykernel_branch:$anykernel_branch}' >> /tmp/metadata.json

            add_variant() {
              local v=$1 has_susfs=$2
              local ds="false"
              local sus="false"
              [ "${{ inputs.use_droidspaces }}" = "true" ] && ds="true"
              [ "$has_susfs" = "true" ] && [ "${{ inputs.enable_susfs }}" = "true" ] && sus="true"
              matrix=$(echo "$matrix" | jq -c --arg kv "$kv" --arg variant "$v" --argjson ds "$ds" --argjson sus "$sus" '.include += [{"kernel_version":$kv,"variant":$variant,"droidspaces":$ds,"susfs":$sus}]')
            }

            [[ "$variant" =~ ^(all|MidoriSU-KO)$ ]] && add_variant MidoriSU-KO true
            [[ "$variant" =~ ^(all|MidoriSU-NX)$ ]] && add_variant MidoriSU-NX true
            [[ "$variant" =~ ^(all|MidoriSU-OG)$ ]] && add_variant MidoriSU-OG true
            [[ "$variant" =~ ^(all|MidoriSU-RE)$ ]] && add_variant MidoriSU-RE true
            [[ "$variant" =~ ^(all|MidoriSU-XX)$ ]] && add_variant MidoriSU-XX true
          done < /tmp/kvs.txt

          echo "metadata=$(jq -sc '.' /tmp/metadata.json)" >> $GITHUB_OUTPUT
          echo "build_matrix=$matrix" >> $GITHUB_OUTPUT

          case "${{ inputs.hook_mode }}" in
            'manual (XX & RE)') hook_mode_val="manual" ;;
            'hookless (XX 6.12 only)') hook_mode_val="hookless" ;;
            'tracepoint (RE only)') hook_mode_val="tracepoint" ;;
            *) hook_mode_val="manual" ;;
          esac
          echo "hook_mode_val=$hook_mode_val" >> $GITHUB_OUTPUT

  build:
    name: "${{ matrix.kernel_version }} - ${{ matrix.variant }}${{ matrix.susfs && (matrix.droidspaces && ' (SUSFS DS)' || ' (SUSFS)') || (matrix.droidspaces && ' (DS)' || '') }}"
    needs: setup
    if: needs.setup.outputs.build_matrix != '{"include":[]}'
    strategy:
      matrix: ${{ fromJson(needs.setup.outputs.build_matrix) }}
    uses: ./.github/workflows/build-kernel.yml
    with:
      kernel_version: ${{ matrix.kernel_version }}
      variant: ${{ matrix.variant }}
      use_droidspaces: ${{ matrix.droidspaces }}
      use_rekernel: ${{ inputs.use_rekernel }}
      unicode_bypass_fix: ${{ inputs.unicode_bypass_fix }}
      use_susfs: ${{ matrix.susfs }}
      source_mirror: ${{ inputs.source_mirror }}
      use_ccache: ${{ inputs.use_ccache }}
      susfs_commit: ${{ inputs.susfs_commit }}
      build_ebpf: ${{ inputs.build_scene_hider }}
      kernel_localversion: ${{ needs.setup.outputs.kernel_localversion }}
      build_epoch: ${{ needs.setup.outputs.build_epoch }}
      build_timestamp: ${{ needs.setup.outputs.build_timestamp }}
      build_user: ${{ inputs.build_user }}
      build_host: ${{ inputs.build_host }}
      midorisu_ko_branch: ${{ inputs.midorisu_ko_branch }}
      midorisu_nx_branch: ${{ inputs.midorisu_nx_branch }}
      midorisu_og_branch: ${{ inputs.midorisu_og_branch }}
      midorisu_re_branch: ${{ inputs.midorisu_re_branch }}
      midorisu_xx_branch: ${{ inputs.midorisu_xx_branch }}
      hook_mode: ${{ needs.setup.outputs.hook_mode_val }}
      ksu_debug: ${{ inputs.ksu_debug }}

  build_scene_hider:
    name: "eBPF ${{ matrix.kernel_version }}"
    needs: [setup]
    if: always() && inputs.build_scene_hider && needs.setup.result == 'success'
    strategy:
      matrix:
        kernel_version: ${{ fromJson(needs.setup.outputs.kernel_versions) }}
    uses: ./.github/workflows/build-ebpf.yml
    with:
      kernel_version: ${{ matrix.kernel_version }}

  release:
    needs: [setup, build, build_scene_hider]
    if: |
      always() &&
      inputs.release_type != 'no-release' &&
      needs.setup.result == 'success' &&
      needs.build.result == 'success' &&
      (needs.build_scene_hider.result == 'success' || needs.build_scene_hider.result == 'skipped')
    strategy:
      matrix:
        kv: ${{ fromJson(needs.setup.outputs.kernel_versions) }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Load metadata for ${{ matrix.kv }}
        id: meta
        run: |
          echo '${{ needs.setup.outputs.metadata }}' | jq -r '.[] | select(.kernel_version=="${{ matrix.kv }}")' > /tmp/meta.json
          while IFS='=' read -r key value; do echo "$key=$value" >> $GITHUB_OUTPUT; done < <(jq -r 'to_entries[] | "\(.key)=\(.value)"' /tmp/meta.json)
          asb_date=$(jq -r '.asb_date' /tmp/meta.json)
          android_ver=$(jq -r '.android_version' /tmp/meta.json)
          sub_level=$(jq -r '.sub_level' /tmp/meta.json)
          r_suffix=$(jq -r '.r_suffix' /tmp/meta.json)
          mirror=$(jq -r '.mirror_name' /tmp/meta.json)
          base_url=$(jq -r '.source_base_url' /tmp/meta.json)
          if [ "$asb_date" = "lts" ]; then
            tar_name="${android_ver}-${{ matrix.kv }}$([ "$mirror" = "Google" ] && echo "-lts" || echo ".${sub_level}_r00").tar.gz"
            display="${android_ver}-${{ matrix.kv }}.${sub_level}_r00"
          else
            tar_name="${android_ver}-${{ matrix.kv }}-${asb_date}${r_suffix}.tar.gz"
            display="${android_ver}-${{ matrix.kv }}.${sub_level}${r_suffix}"
          fi
          echo "kernel_source_url=${base_url}/${tar_name}" >> $GITHUB_OUTPUT
          echo "kernel_display_name=${display}" >> $GITHUB_OUTPUT

      - uses: actions/download-artifact@v8
        with:
          pattern: 'commit-info-${{ matrix.kv }}-*'
          path: commit_info
          merge-multiple: true

      - uses: actions/download-artifact@v8
        with:
          pattern: 'Kernel-${{ matrix.kv }}-*'
          path: release_zips
          merge-multiple: true

      - uses: actions/download-artifact@v8
        if: inputs.build_scene_hider == true
        with:
          name: ScenePortHider-eBPF-${{ matrix.kv }}
          path: release_zips
        continue-on-error: true

      - name: Check eBPF artifact
        run: |
          ebpf=$(find ${{ github.workspace }}/release_zips -maxdepth 1 -name 'ScenePortHider-eBPF*.zip' 2>/dev/null | head -n 1)
          echo "EBPF_FILE=$(basename "$ebpf" 2>/dev/null)" >> $GITHUB_ENV

      - name: Download KSU Toolkit Module
        run: |
          toolkit=""
          url=$(curl -sL "https://nightly.link/backslashxx/ksu_toolkit/workflows/module/master?preview" | grep -oP 'https://nightly\.link/backslashxx/ksu_toolkit/workflows/module/master/ksu_toolkit-\d+\.zip' | head -n 1)
          if [ -n "$url" ]; then
            toolkit=$(basename "$url")
            curl --fail -L -o "${{ github.workspace }}/release_zips/${toolkit}" "$url" || toolkit=""
          fi
          echo "TOOLKIT_FILE=$toolkit" >> $GITHUB_ENV

      - name: Download SUSFS Module
        if: inputs.enable_susfs == true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo sidex15/susfs4ksu-module --pattern "*.zip" --dir release_zips 2>/dev/null || true

      - name: Download MidoriSU Manager APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download --repo midori01/KernelSU --pattern "*.apk" --dir release_zips 2>/dev/null || true
          apk=$(ls release_zips/*.apk 2>/dev/null | head -n 1)
          echo "MIDORISU_APK=$(basename "$apk" 2>/dev/null)" >> $GITHUB_ENV
          echo "KSUD_VERSION=$(echo "$apk" | grep -oP '\d+(?=-release\.apk$)' || echo "unknown")" >> $GITHUB_ENV

      - name: Read Commit Info
        id: ksu_info
        run: |
          variant="${{ inputs.ksu_variant }}"
          short_sha() { cut -c1-7 "$1"; }
          out() { echo "$1" >> $GITHUB_OUTPUT; }
          ksu_line() {
            local tag=$1 repo=$2 file=$3
            [ -f "$file" ] && [[ "$variant" =~ ^(all|$tag)$ ]] || return 0
            out "${tag,,}=- **$tag**: [\`$(short_sha "$file")\`](https://github.com/$repo/commit/$(cat "$file")) \`$(cat "${file%_commit}_date")\`"
          }
          if [ -f "commit_info/susfs_commit" ]; then
            sha=$(cat commit_info/susfs_commit)
            out "susfs_commit=\`$(short_sha commit_info/susfs_commit)\`"
            out "susfs_url=https://gitlab.com/simonpunk/susfs4ksu/-/commit/$sha"
            out "susfs_date=\`$(cat commit_info/susfs_date)\`"
          fi
          if [ -f "commit_info/driver_version" ]; then
            out "driver_version=$(cat commit_info/driver_version)"
          fi
          ksu_line MidoriSU-KO "$(cat commit_info/midorisu_ko_ksu_repo 2>/dev/null)" commit_info/midorisu_ko_ksu_commit
          ksu_line MidoriSU-NX "$(cat commit_info/midorisu_nx_ksu_repo 2>/dev/null)" commit_info/midorisu_nx_ksu_commit
          ksu_line MidoriSU-OG "$(cat commit_info/midorisu_og_ksu_repo 2>/dev/null)" commit_info/midorisu_og_ksu_commit
          ksu_line MidoriSU-RE "$(cat commit_info/midorisu_re_ksu_repo 2>/dev/null)" commit_info/midorisu_re_ksu_commit
          ksu_line MidoriSU-XX "$(cat commit_info/midorisu_xx_ksu_repo 2>/dev/null)" commit_info/midorisu_xx_ksu_commit

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: "${{ needs.setup.outputs.release_tag }}-${{ matrix.kv }}"
          name: ${{ format('Midori Kernel - {0}{1}', matrix.kv, inputs.ksu_debug && ' [DEBUG]' || '') }}
          make_latest: ${{ matrix.kv == '6.12' || !contains(needs.setup.outputs.kernel_versions, ',') }}
          body: |
            - **Kernel Source**: [`${{ steps.meta.outputs.mirror_name }}`](${{ steps.meta.outputs.kernel_source_url }}) `${{ steps.meta.outputs.kernel_display_name }}`
            ${{ steps.ksu_info.outputs.midorisu-ko }}
            ${{ steps.ksu_info.outputs.midorisu-nx }}
            ${{ steps.ksu_info.outputs.midorisu-og }}
            ${{ steps.ksu_info.outputs.midorisu-re }}
            ${{ steps.ksu_info.outputs.midorisu-xx }}
            ${{ steps.ksu_info.outputs.susfs_url && format('- **SUSFS**: [{0}]({1}) {2}', steps.ksu_info.outputs.susfs_commit, steps.ksu_info.outputs.susfs_url, steps.ksu_info.outputs.susfs_date) || '' }}
            - **KSU Driver**: `${{ steps.ksu_info.outputs.driver_version || env.KSUD_VERSION }}`　**KSUD Version**: `${{ env.KSUD_VERSION }}`
            - **Manager**: `${{ env.MIDORISU_APK }}`
            - **Spoofed uname**: `${{ matrix.kv }}.${{ steps.meta.outputs.sub_level }}${{ needs.setup.outputs.kernel_localversion }}`
            - **Spoofed Build Time**: `${{ needs.setup.outputs.build_timestamp }}`
            - **Spoofed Builder**: `${{ inputs.build_user }}@${{ inputs.build_host }}`
            - **Unicode Bypass**: ${{ inputs.unicode_bypass_fix && '`✅ Fixed`' || '`❌ Vulnerable`' }}　**Re:Kernel**: ${{ inputs.use_rekernel && '`✅ Built-in`' || '❌' }}
            - **Droidspaces**: ${{ inputs.use_droidspaces && '✅' || '❌' }}　**NTSync**: ${{ inputs.use_droidspaces && '✅' || '❌' }}　**Ccache**: ${{ inputs.use_ccache && '`✅ Enabled`' || '`❌ Disabled`' }}
            - **TMPFS**: ✅　**BBR**: ✅　**IPSET**: ✅　**Enhanced NAT**: ✅
            - **eBPF**: ${{ env.EBPF_FILE && format('✅ `({0})`', env.EBPF_FILE) || '❌' }}
            - **KSU Toolkit**: ${{ env.TOOLKIT_FILE && format('✅ `({0})`', env.TOOLKIT_FILE) || '❌' }}
            - **Compiler**: `clang-${{ steps.meta.outputs.clang_version }}`${{ steps.meta.outputs.rust_version && format('　**Rust**: `{0}`', steps.meta.outputs.rust_version) || '' }}
          files: |
            release_zips/*.zip
            release_zips/*.apk
          prerelease: ${{ inputs.release_type == 'pre-release' }}

  cleanup:
    needs: release
    if: success() || failure()
    uses: ./.github/workflows/cleanup-tags.yml
